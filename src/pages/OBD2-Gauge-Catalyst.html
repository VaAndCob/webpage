<!DOCTYPE html>
<html>
  <head>
    <title>ESP32 Serial OBD2 Gauge Catalyst (under development)</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/tabs.css" />
  </head>

  <body>
    <h2 id="firmware-title">ESP32 Serial OBD2 Gauge Catalyst</h2>
          <a href="https://youtube.com/shorts/zx2siWw9A-U?si=f-y1-ZZnJ7jGb50c"  target="_blank" rel="noopener noreferrer">YouTube</a>
       |
          <a
      href="https://github.com/VaAndCob/ESP32-Serial-OBD2-Gauge-Catalyst"
      target="_blank"
      rel="noopener noreferrer"
      >Link to the project</a
    >
    <br /><br />
      <a>
          <img
            src="../asset/catalyst.png"
            alt="TuneBar"
            style="max-width: 300px; height: auto"
          />
        </a>
 
    <br><br>

    <div id="main">
      <fieldset>
        <legend>Select board</legend>
        <form id="select-firmware">
          <input
            type="radio"
            id="catalyst"
            name="device"
            value="catalyst"
            class="firmware-radio"
            onclick="setManifest('catalyst_1')"
            checked
          />
          <label for="catalyst">ESP32 CYD 2.8" Varint 1</label><br />
          <input
            type="radio"
            id="catalyst"
            name="device"
            value="catalyst"
            class="firmware-radio"
            onclick="setManifest('catalyst_2')"
            checked
          />
          <label for="catalyst">ESP32 CYD 2.8" Varint 2</label><br />
        </form>
        <hr />
                <div class="terminal-container">
          <textarea readonly id="terminal"></textarea>
        </div>
        <esp-web-install-button id="init-button">
          <button slot="activate" style="margin-top: 30px">Flash</button><br />
          <span slot="unsupported">Your browser doesn't support!</span><br />
          <span slot="not-allowed">Not support HTTP!</span>
        </esp-web-install-button>

      </fieldset>
    </div>

    <script
      type="module"
      src="https://vaandcob.github.io/webpage/webserial/install-button.js?module"
    ></script>

    <script>
      let url = "../../firmware/catalyst/";
      const terminal = document.getElementById("terminal");

      function terminalOut(message) {
        terminal.value += message + "\n";
        terminal.scrollTop = terminal.scrollHeight; // Scroll to the bottom
      }

      function setManifest(device) {
        document
          .getElementById("init-button")
          .setAttribute("manifest", `${url}${device}_manifest.json`);
           terminal.value = "";//clear terminal
        terminalOut("Select firmware -> " + device);
        readManifest(device);
      }

      window.onload = function () {
        setManifest("catalyst");
      };

      async function readManifest(device) {
        try {
          const response = await fetch(`${url}${device}_manifest.json`);
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          const manifestData = await response.json();
          // Update the h2 heading
          document.querySelector(
            "h2"
          ).textContent = `${manifestData.name} - ${manifestData.version}`;
        } catch (error) {
          terminalOut(`Error reading manifest: ${error.message}`);
        }
      }
    </script>
  </body>
</html>
